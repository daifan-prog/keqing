<script type="text/babel" data-presets="react">
const { useState, useEffect, useMemo } = React;

// ============================================================
// Rank 1 Watch — standalone web app version.
// Tracks GH's #1 run on the Keqing (Mistsplitter Reforged R1)
// leaderboard on akasha.cv, anchored Feb 2, 2026.
//
// Same design and logic as the Claude.ai artifact version, with
// one change: persistence uses the browser's own localStorage
// instead of Claude's window.storage API, since this runs
// standalone in any browser.
// ============================================================

const DAY = 86400000;
const toIdx = (iso) => Math.floor(new Date(iso + "T00:00:00Z").getTime() / DAY);
const todayIso = () => new Date().toISOString().slice(0, 10);
const fmtShort = (iso) => new Date(iso + "T00:00:00Z").toLocaleDateString("en-US", { month: "short", day: "numeric" });
const fmtLong = (iso) => new Date(iso + "T00:00:00Z").toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric" });

const SEED_CHECKINS = [
  { date: "2026-02-02", rank: 1, total: null, note: "First reached Rank 1" },
  { date: "2026-07-20", rank: 1, total: 161415, note: "Confirmed live via akasha.cv" },

const SEED_BUILD = { weapon: "Mistsplitter Reforged R5", artifactSet: "Thundering Fury (4pc)", critRate: "80.8", critDmg: "262.3", atk: "2052", dmgBonus: "73.6", elementalMastery: "100", avgDmg: "595809" };
const SEED_TOP20 = {

  rows: [
    { rank: 1, nickname: "GH", avgDmg: 595809, cv: 281.4 },

    { rank: 11, nickname: "Yuki", avgDmg: 581097, cv: 272.9 },
    { rank: 12, nickname: "ベロ", avgDmg: 580805, cv: 265.1 },
    { rank: 13, nickname: "take", avgDmg: 580498, cv: 277.5 },
    { rank: 14, nickname: "紫色电电猫", avgDmg: 579782, cv: 282.1 },
    { rank: 15, nickname: "Rena", avgDmg: 579469, cv: 283.0 },
    { rank: 16, nickname: "Shinory", avgDmg: 578831, cv: 267.4 },
    { rank: 17, nickname: "いであ", avgDmg: 577638, cv: 257.4 },
    { rank: 18, nickname: "Firesnake", avgDmg: 577580, cv: 281.4 },
    { rank: 19, nickname: "守到晴来", avgDmg: 577457, cv: 293.0 },
    { rank: 20, nickname: "遥", avgDmg: 576518, cv: 279.8 },
  ],
};
const SEED_TOP20_HISTORY = [SEED_TOP20];

const CHECKINS_KEY = "rank1:checkins";
const BUILD_KEY = "rank1:build";
const BUILD_IMAGE_KEY = "rank1:build-image";
const IMAGE_TAB_KEY = "rank1:build-image-tab";
const TOP20_KEY = "rank1:top20";
const TOP20_HISTORY_KEY = "rank1:top20-history";

const PROFILE_URL = "https://akasha.cv/profile/602489073";
const BUILD_URL = "https://akasha.cv/profile/602489073?build=3522b7a268c3bb5c07a0d35bbda27828";
const BOARD_URL = "https://akasha.cv/leaderboards/1000004200/tf";

// Change this to whatever PIN you want — anyone who views this page's source
// can see it, since this is a static site with no server to keep it secret.
// This is a friction layer against someone casually messing with your data if
// they find the URL, not real security against someone determined.
const EDIT_PIN = "1234";

const BUILD_FIELDS = [
  { key: "weapon", label: "Weapon", placeholder: "Mistsplitter Reforged R1" },
  { key: "artifactSet", label: "Artifact set", placeholder: "4pc Thundering Fury" },
  { key: "critRate", label: "Crit rate %", placeholder: "70.2", numeric: true },
  { key: "critDmg", label: "Crit DMG %", placeholder: "180.5", numeric: true },
  { key: "atk", label: "ATK", placeholder: "2450", numeric: true },
  { key: "dmgBonus", label: "DMG bonus %", placeholder: "95.3", numeric: true },
  { key: "elementalMastery", label: "Elemental Mastery", placeholder: "100", numeric: true },
  { key: "avgDmg", label: "Avg DMG (leaderboard)", placeholder: "48920", numeric: true },
];

function loadJSON(key, fallback) {
  try {
    const raw = localStorage.getItem(key);
    if (raw === null) return fallback;
    return JSON.parse(raw);
  } catch (e) {
    return fallback;
  }
}

function saveJSON(key, value) {
  try {
    localStorage.setItem(key, JSON.stringify(value));
    return true;
  } catch (e) {
    return false;
  }
}

// ---------- icons (hand-drawn, no icon library) ----------

  ),
  spinner: (p) => (
    <svg width={p.size || 14} height={p.size || 14} viewBox="0 0 24 24" fill="none" className="spin" style={p.style}>
      <path d="M12 2a10 10 0 1 0 10 10" stroke="currentColor" strokeWidth="2.4" strokeLinecap="round" />
    </svg>
  ),
};

function RankTracker() {
  const [checkins, setCheckins] = useState(SEED_CHECKINS);
  const [storageReady, setStorageReady] = useState(false);
  const [rankInput, setRankInput] = useState("1");
  const [totalInput, setTotalInput] = useState("");
  const [dateInput, setDateInput] = useState(todayIso());
  const [noteInput, setNoteInput] = useState("");
  const [err, setErr] = useState("");

  const [build, setBuild] = useState(SEED_BUILD);
  const [editingBuild, setEditingBuild] = useState(false);
  const [buildForm, setBuildForm] = useState(SEED_BUILD);
  const [hasSavedBuild, setHasSavedBuild] = useState(true);
  const [customImage, setCustomImage] = useState(null);
  const [repoCustomImage, setRepoCustomImage] = useState(null);
  const [autoImage, setAutoImage] = useState(null);
  const [imageTab, setImageTab] = useState("custom"); // "auto" | "custom"
  const [imageLoading, setImageLoading] = useState(false);
  const [imageErr, setImageErr] = useState("");
  const [imageModalOpen, setImageModalOpen] = useState(false);

  const [unlocked, setUnlocked] = useState(false);
  const [unlockAnimating, setUnlockAnimating] = useState(false);
  const [pinInput, setPinInput] = useState("");
  const [pinError, setPinError] = useState("");
  const [shakeError, setShakeError] = useState(false);

  const [activeTab, setActiveTab] = useState("tracker");
  const [top20, setTop20] = useState(SEED_TOP20);
  const [top20Form, setTop20Form] = useState(SEED_TOP20);
  const [editingTop20, setEditingTop20] = useState(false);
  const [hasSavedTop20, setHasSavedTop20] = useState(true);
  const [top20History, setTop20History] = useState(SEED_TOP20_HISTORY);
  const [expandedHistoryDate, setExpandedHistoryDate] = useState(null);

  useEffect(() => {
    const savedCheckins = loadJSON(CHECKINS_KEY, null);
    const savedBuild = loadJSON(BUILD_KEY, null);
    const savedTop20 = loadJSON(TOP20_KEY, null);
    const savedTop20History = loadJSON(TOP20_HISTORY_KEY, null);
    let savedImage = null;
    try {
      savedImage = localStorage.getItem(BUILD_IMAGE_KEY);
    } catch (e) {
      // no screenshot saved, that's fine
    }
    let savedTab = null;
    try {
      savedTab = localStorage.getItem(IMAGE_TAB_KEY);
    } catch (e) {
      // no preference saved, that's fine
    }
    if (Array.isArray(savedCheckins) && savedCheckins.length > 0) setCheckins(savedCheckins);
    if (savedBuild) {
      setBuild(savedBuild);
      setBuildForm(savedBuild);
      setHasSavedBuild(true);
      setEditingBuild(false);
    }
    if (savedTop20 && Array.isArray(savedTop20.rows) && savedTop20.rows.length > 0) {
      setTop20(savedTop20);
      setTop20Form(savedTop20);
      setHasSavedTop20(true);
      setEditingTop20(false);
    }
    if (Array.isArray(savedTop20History) && savedTop20History.length > 0) {
      setTop20History(savedTop20History);
    }
    if (savedImage) setCustomImage(savedImage);
    if (savedTab === "auto" || savedTab === "custom") setImageTab(savedTab);
    setStorageReady(true);
  }, []);

  const [autoSync, setAutoSync] = useState(null); // { updatedOn, fetchedAt, totalPlayers } once a successful sync happens
  const [syncing, setSyncing] = useState(false);
  const [syncError, setSyncError] = useState("");

  const syncFromDataFile = async (isManual) => {
    if (isManual) {
      setSyncing(true);
      setSyncError("");
    }
    try {
      const res = await fetch("./data/leaderboard.json", { cache: "no-store" });
      if (!res.ok) {
        if (isManual) setSyncError("No synced data found yet — trigger the GitHub Action first, then try again.");
        return;
      }
      const data = await res.json();

      if (data.top20 && Array.isArray(data.top20.rows) && data.top20.rows.length > 0) {
        setTop20((prevTop20) => {
          if (prevTop20.updatedOn && prevTop20.updatedOn !== data.top20.updatedOn) {
            setTop20History((prevHist) => {
              if (prevHist.some((h) => h.updatedOn === prevTop20.updatedOn)) return prevHist;
              const merged = prevHist.concat([prevTop20]).sort((a, b) => (a.updatedOn < b.updatedOn ? 1 : -1));
              saveJSON(TOP20_HISTORY_KEY, merged);
              return merged;
            });
          }
          saveJSON(TOP20_KEY, data.top20);
          return data.top20;
        });
        setTop20Form(data.top20);
        setHasSavedTop20(true);
        setEditingTop20(false);
      }

      if (data.build) {
        setBuild(data.build);
        setBuildForm(data.build);
        setHasSavedBuild(true);
        setEditingBuild(false);
        saveJSON(BUILD_KEY, data.build);
      }

      if (data.updatedOn && data.trackedRank) {
        setCheckins((prevCheckins) => {
          if (prevCheckins.some((c) => c.date === data.updatedOn)) return prevCheckins;
          const next = prevCheckins
            .concat([{ date: data.updatedOn, rank: data.trackedRank, total: data.totalPlayers || null, note: "Auto-synced from akasha.cv" }])
            .sort((a, b) => (a.date < b.date ? -1 : 1));
          saveJSON(CHECKINS_KEY, next);
          return next;
        });
      }

      setAutoSync({ updatedOn: data.updatedOn, fetchedAt: data.fetchedAt, totalPlayers: data.totalPlayers });

      setAutoImage(`./data/build-screenshot.png?t=${encodeURIComponent(data.fetchedAt || data.updatedOn || Date.now())}`);
    } catch (e) {
      if (isManual) setSyncError("Couldn't reach data/leaderboard.json — check it's deployed at that path.");
    } finally {
      if (isManual) setSyncing(false);
    }
  };

  const checkRepoCustomImage = async () => {
    // Optional: if the person committed their own image to the repo at this
    // fixed path (rather than uploading it per-device), it shows up on every
    // device that opens this same hosted site — no backend or secret needed,
    // since it's just a normal file they added themselves via GitHub.
    try {
      const res = await fetch("./data/custom-screenshot.png", { method: "HEAD", cache: "no-store" });
      if (res.ok) {
        setRepoCustomImage(`./data/custom-screenshot.png?t=${Date.now()}`);
      } else {
        setRepoCustomImage(null);
      }
    } catch (e) {
      setRepoCustomImage(null);
    }
  };

  useEffect(() => {
    // Optional: if this app is hosted alongside data/leaderboard.json (see the
    // GitHub Actions workflow in this bundle), pull it in automatically and use
    // it as the current build/top20/check-in data. If the file doesn't exist —
    // e.g. running locally, or the Action hasn't run yet — this just silently
    // does nothing and the app keeps whatever's already loaded.
    syncFromDataFile(false);
    checkRepoCustomImage();
  }, []);

  const persistCheckins = (next) => {
    setCheckins(next);
    const ok = saveJSON(CHECKINS_KEY, next);
    if (!ok) setErr("Saved for this session only — this browser's storage might be full or blocked.");
  };

  const saveBuild = () => {
    const cleaned = {};
    BUILD_FIELDS.forEach(({ key, numeric }) => {
      const raw = (buildForm[key] ?? "").toString().trim();
      cleaned[key] = numeric ? (raw ? parseFloat(raw) : null) : raw;
    });
    setBuild(cleaned);
    setBuildForm(cleaned);
    setHasSavedBuild(true);
    setEditingBuild(false);
    const ok = saveJSON(BUILD_KEY, cleaned);
    if (!ok) setErr("Build saved for this session only — this browser's storage might be full or blocked.");
  };

  const updateTop20Row = (index, field, value) => {
    const rows = top20Form.rows.slice();
    rows[index] = { ...rows[index], [field]: value };
    setTop20Form({ ...top20Form, rows });
  };

  const saveTop20 = () => {
    const cleaned = {
      updatedOn: todayIso(),
      rows: top20Form.rows.map((r) => ({
        rank: r.rank,
        nickname: (r.nickname || "").trim(),
        avgDmg: r.avgDmg !== "" && r.avgDmg != null ? parseFloat(r.avgDmg) : null,
        cv: r.cv !== "" && r.cv != null ? parseFloat(r.cv) : null,
      })),
    };
    setTop20(cleaned);
    setTop20Form(cleaned);
    setHasSavedTop20(true);
    setEditingTop20(false);
    const ok = saveJSON(TOP20_KEY, cleaned);
    if (!ok) setErr("Top 20 saved for this session only — this browser's storage might be full or blocked.");

    const nextHistory = top20History
      .filter((h) => h.updatedOn !== cleaned.updatedOn)
      .concat([cleaned])
      .sort((a, b) => (a.updatedOn < b.updatedOn ? 1 : -1));
    setTop20History(nextHistory);
    saveJSON(TOP20_HISTORY_KEY, nextHistory);
  };

  const ANIMATION_DURATION_MS = 1400;

  const submitPin = () => {
    if (pinInput === EDIT_PIN) {
      setPinError("");
      setUnlockAnimating(true);
      setTimeout(() => {
        setUnlocked(true);
        setUnlockAnimating(false);
        setPinInput("");
      }, ANIMATION_DURATION_MS);
    } else {
      setPinError("Incorrect PIN.");
      setPinInput("");
      setShakeError(true);
      setTimeout(() => setShakeError(false), 500);
    }
  };

  const selectImageTab = (tab) => {
    setImageTab(tab);
    try {
      localStorage.setItem(IMAGE_TAB_KEY, tab);
    } catch (e) {
      // non-fatal — just won't be remembered next visit
    }
  };

  const handleImageUpload = (file) => {
    setImageErr("");
    setImageLoading(true);
    const reader = new FileReader();
    reader.onload = () => {
      const dataUrl = reader.result;
      setCustomImage(dataUrl);
      selectImageTab("custom");
      setImageLoading(false);
      try {
        localStorage.setItem(BUILD_IMAGE_KEY, dataUrl);
      } catch (e) {
        setImageErr("Screenshot shown, but it's too large to save to this browser's storage.");
      }
    };
    reader.onerror = () => {
      setImageErr("Couldn't read that file — try a different image.");
      setImageLoading(false);
    };
    reader.readAsDataURL(file);
  };

  const removeBuildImage = () => {
    setCustomImage(null);
    try {
      localStorage.removeItem(BUILD_IMAGE_KEY);
    } catch (e) {
      // already cleared from view either way
    }
  };

  const submit = () => {
    setErr("");
    const rank = parseInt(rankInput, 10);
    if (!dateInput) return setErr("Pick a date.");
    if (!rank || rank < 1) return setErr("Rank must be a positive number.");
    if (dateInput > todayIso()) return setErr("Can't log a future date.");
    const total = totalInput.trim() ? parseInt(totalInput, 10) : null;
    if (totalInput.trim() && (!total || total < rank)) return setErr("Total players must be a number ≥ rank.");
    const next = checkins.filter((c) => c.date !== dateInput).concat([{ date: dateInput, rank, total, note: noteInput.trim() }]);
    persistCheckins(next.sort((a, b) => (a.date < b.date ? -1 : 1)));
    setNoteInput("");
    setTotalInput("");
  };

  const remove = (date) => {
    const sortedNow = checkins.slice().sort((a, b) => (a.date < b.date ? -1 : 1));
    if (sortedNow.length <= 1) {
      window.alert("You need at least one check-in — this is your only one, so it can't be deleted. Log a new one first if you want to replace it.");
      return;
    }
    if (date === sortedNow[0]?.date) {
      if (!window.confirm("This is your earliest logged check-in — removing it changes your all-time anchor date. Continue?")) return;
    }
    persistCheckins(checkins.filter((c) => c.date !== date));
  };

  const sorted = useMemo(() => {
    const base = checkins.length > 0 ? checkins : SEED_CHECKINS;
    return base.slice().sort((a, b) => (a.date < b.date ? -1 : 1));
  }, [checkins]);

  const stats = useMemo(() => {
    const today = todayIso();
    const todayIdx = toIdx(today);
    const anchorIdx = toIdx(sorted[0].date);

    const intervals = sorted.map((c, i) => {
      const start = toIdx(c.date);
      const end = i + 1 < sorted.length ? toIdx(sorted[i + 1].date) - 1 : todayIdx;
      return { start, end: Math.max(start, end), rank: c.rank };
    });

    const overlapAtRank1 = (rs, re) =>
      intervals.reduce((sum, iv) => {
        if (iv.rank !== 1) return sum;
        const s = Math.max(iv.start, rs);
        const e = Math.min(iv.end, re);
        return sum + Math.max(0, e - s + 1);
      }, 0);

    const currentYear = Number(today.slice(0, 4));
    const isLeapYear = (currentYear % 4 === 0 && currentYear % 100 !== 0) || currentYear % 400 === 0;
    const daysInYear = isLeapYear ? 366 : 365;
    const yearStartIdx = toIdx(`${currentYear}-01-01`);
    const daysElapsedYTD = todayIdx - yearStartIdx + 1;
    const daysLeftInYear = daysInYear - daysElapsedYTD;
    const daysAtRank1YTD = overlapAtRank1(yearStartIdx, todayIdx);
    const ytdPercent = daysElapsedYTD > 0 ? (daysAtRank1YTD / daysElapsedYTD) * 100 : 0;
    const yearPercent = (daysAtRank1YTD / daysInYear) * 100;

    const totalDaysAtRank1 = overlapAtRank1(anchorIdx, todayIdx);
    const daysSinceAnchor = todayIdx - anchorIdx + 1;

    const lastInterval = intervals[intervals.length - 1];
    const currentRank = sorted[sorted.length - 1].rank;
    // walk backward merging consecutive same-rank intervals so re-confirming
    // the same rank on a later date doesn't reset the streak to that date
    let streakStartIdx = lastInterval.start;
    for (let i = intervals.length - 2; i >= 0; i--) {
      if (intervals[i].rank === currentRank) {
        streakStartIdx = intervals[i].start;
      } else {
        break;
      }
    }
    const currentStreak = currentRank === 1 ? todayIdx - streakStartIdx + 1 : 0;

    const chartPoints = sorted.map((c) => ({ date: c.date, rank: c.rank }));
    if (sorted[sorted.length - 1].date !== today) {
      chartPoints.push({ date: today, rank: currentRank });
    }
    const maxRank = Math.max(4, ...sorted.map((c) => c.rank));

    let lastKnownTotal = null;
    for (let i = sorted.length - 1; i >= 0; i--) {
      if (sorted[i].total) { lastKnownTotal = sorted[i].total; break; }
    }
    const percentile = lastKnownTotal ? (currentRank / lastKnownTotal) * 100 : null;

    return { ytdPercent, yearPercent, daysAtRank1YTD, daysElapsedYTD, daysLeftInYear, daysInYear, currentYear, totalDaysAtRank1, daysSinceAnchor, currentRank, currentStreak, chartPoints, maxRank, lastKnownTotal, percentile };
  }, [sorted]);

  useEffect(() => {
    if (!imageModalOpen) return;

            55% { transform: translateY(8px) scale(1.2) rotate(6deg); opacity: 1; }
            75% { transform: translateY(-4px) scale(0.95) rotate(-2deg); }
            100% { transform: translateY(0) scale(1) rotate(0deg); opacity: 1; }
          }
          @keyframes glowBurst {

            100% { transform: scale(3); opacity: 0; }
          }

          }
          @keyframes fadeUp {
            0% { opacity: 0; transform: translateY(6px); }
            100% { opacity: 1; transform: translateY(0); }

          .unlock-bolt { animation: boltDrop 0.6s cubic-bezier(.34,1.56,.64,1) forwards; }
          .unlock-spark { animation: sparkFly 0.9s ease-out forwards; }
          .unlock-text { animation: fadeUp 0.4s ease 0.5s both; }

                    ...styles.unlockSpark,
                    "--tx": `${Math.cos(angle) * dist}px`,

            })}

  return (

        @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap');

              {build.critDmg !== "" && build.critDmg != null && <BuildStat label="Crit DMG" value={`${build.critDmg}%`} />}

              {build.dmgBonus !== "" && build.dmgBonus != null && <BuildStat label="DMG bonus" value={`${build.dmgBonus}%`} />}
              {build.elementalMastery !== "" && build.elementalMastery != null && <BuildStat label="Elemental Mastery" value={Number(build.elementalMastery).toLocaleString()} />}
              {build.avgDmg !== "" && build.avgDmg != null && <BuildStat label="Avg DMG" value={Number(build.avgDmg).toLocaleString()} />}

        </div>

        <div style={styles.heroGrid}>
          <div style={styles.ringCard}>
            <svg width="140" height="140" viewBox="0 0 140 140">
              <circle cx="70" cy="70" r="54" fill="none" stroke="#2a2246" strokeWidth="10" />
              <circle
                cx="70" cy="70" r="54" fill="none" stroke="url(#goldGrad)" strokeWidth="10"
                strokeDasharray={circumference} strokeDashoffset={circumference * (1 - ringPct / 100)}
                strokeLinecap="round" transform="rotate(-90 70 70)"
              />
              <defs>
                <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                  <stop offset="0%" stopColor="#f2c14e" />

              <foreignObject x="20" y="42" width="100" height="56">
                <div style={{ textAlign: "center", fontFamily: "'Rajdhani',sans-serif" }}>
                  <div style={{ fontSize: 30, fontWeight: 700, color: "#f2c14e", lineHeight: 1 }}>{stats.currentStreak}</div>
                  <div style={{ fontSize: 10, letterSpacing: 1, color: "#9a90b8", marginTop: 4 }}>DAY STREAK</div>
                </div>
              </foreignObject>
            </svg>
            <div style={styles.ringCaption}><Icon.bolt size={12} /> current run at Rank 1</div>
          </div>

          <div style={styles.statsGrid}>
            <StatCard label="YTD % at Rank 1" value={`${stats.ytdPercent.toFixed(2)}%`} sub={`${stats.daysAtRank1YTD} of ${stats.daysElapsedYTD} days elapsed in ${stats.currentYear}`} />
            <StatCard label={`% of ${stats.currentYear} at Rank 1`} value={`${stats.yearPercent.toFixed(2)}%`} sub={`${stats.daysAtRank1YTD} of ${stats.daysInYear} days — running total`} accent />
            <StatCard label="Total days at Rank 1" value={stats.totalDaysAtRank1} sub="since first reaching #1" />
            <StatCard label="Days since Feb 2, 2026" value={stats.daysSinceAnchor} sub="anchor date tracked" />
            <StatCard label={`Days left in ${stats.currentYear}`} value={stats.daysLeftInYear} sub="remaining to keep the streak" />
            {stats.percentile !== null && (
              <StatCard label="Percentile" value={`Top ${stats.percentile.toFixed(3)}%`} sub={`#${stats.currentRank} of ${stats.lastKnownTotal.toLocaleString()} players`} />
            )}
          </div>
        </div>

        <div style={styles.panel}>
          <div style={styles.panelTitle}>Rank history</div>
          <RankChart points={stats.chartPoints} maxRank={stats.maxRank} />
        </div>

        <div style={styles.panel}>
          <div style={styles.panelTitle}>Log a check-in</div>
          <div style={styles.form}>
            <input type="date" value={dateInput} max={todayIso()} onChange={(e) => setDateInput(e.target.value)} style={styles.input} />
            <input type="number" min="1" placeholder="Rank" value={rankInput} onChange={(e) => setRankInput(e.target.value)} style={{ ...styles.input, width: 80 }} />
            <input type="number" min="1" placeholder="of total (optional)" value={totalInput} onChange={(e) => setTotalInput(e.target.value)} style={{ ...styles.input, width: 130 }} />
            <input type="text" placeholder="Note (optional)" value={noteInput} onChange={(e) => setNoteInput(e.target.value)} style={{ ...styles.input, flex: 1, minWidth: 140 }} />
            <button onClick={submit} style={styles.button}><Icon.plus size={14} /> Log</button>
          </div>
          {err && <div style={styles.errText}>{err}</div>}
        </div>

        <div style={styles.panel}>
          <div style={styles.panelTitle}>Check-in log</div>
          <div>
            {sorted.slice().reverse().map((c) => (
              <div key={c.date} className="checkin-row" style={styles.row}>
                <span style={styles.rowDate}>{fmtLong(c.date)}</span>
                <span style={styles.rowRank(c.rank)}>{c.rank === 1 ? <Icon.crown size={12} /> : null} #{c.rank}{c.total ? ` /${c.total.toLocaleString()}` : ""}</span>
                <span style={styles.rowNote}>{c.note}</span>
                <button className="del-btn" onClick={() => remove(c.date)} style={styles.delBtn}><Icon.trash size={13} /></button>
              </div>
            ))}
          </div>
        </div>
        </>
        )}

        {activeTab === "top20" && (
          <>
          <div style={styles.panel}>
            <div style={styles.buildHeader}>
              <div style={styles.panelTitle}>Top 20 — Keqing (TF)</div>
              <div style={{ display: "flex", gap: 12, alignItems: "center" }}>
                <a className="link" style={styles.link} href={BOARD_URL} target="_blank" rel="noopener noreferrer">

            {top20.updatedOn && !editingTop20 && (
              <div style={styles.top20Updated}>
                Last updated {fmtLong(top20.updatedOn)} ({daysSinceTop20Update} day{daysSinceTop20Update === 1 ? "" : "s"} ago)
              </div>
            )}

            {top20Overdue && !editingTop20 && (
              <div style={styles.overdueBanner}>
                <Icon.bolt size={13} /> It's been {daysSinceTop20Update} days since your last check — head to akasha.cv and update your Top 20.
              </div>
            )}

            {editingTop20 ? (
              <div>
                <div style={styles.top20EditHint}>
                  Paste in whatever's visible on the leaderboard — nickname and one or two stats are enough. Leave rows blank if you don't have the data.
                </div>
                <div style={styles.top20Table}>
                  <div style={styles.top20HeaderRow}>
                    <span style={styles.top20ColRank}>#</span>
                    <span style={styles.top20ColName}>Nickname</span>
                    <span style={styles.top20ColStat}>Avg DMG</span>
                    <span style={styles.top20ColStat}>CV</span>
                  </div>
                  {top20Form.rows.map((row, i) => (
                    <div key={row.rank} style={styles.top20EditRow}>
                      <span style={styles.top20ColRank}>{row.rank}</span>

                      <input

                      <input
                        type="number"

                        value={row.cv}
                        onChange={(e) => updateTop20Row(i, "cv", e.target.value)}
                        style={{ ...styles.input, ...styles.top20InputStat }}
                      />

                </div>
                <button onClick={saveTop20} style={{ ...styles.button, marginTop: 12 }}>

                </button>
              </div>
            ) : (
              <div style={styles.top20Table}>
                <div style={styles.top20HeaderRow}>
                  <span style={styles.top20ColRank}>#</span>
                  <span style={styles.top20ColName}>Nickname</span>
                  <span style={styles.top20ColStat}>Avg DMG</span>
                  <span style={styles.top20ColStat}>CV</span>
                </div>
                {top20.rows.map((row) => (
                  <div key={row.rank} style={styles.top20Row(row.rank === 1)}>
                    <span style={styles.top20ColRank}>
                      {row.rank === 1 ? <Icon.crown size={12} style={{ marginRight: 3, marginBottom: -1 }} /> : null}
                      {row.rank}
                    </span>
                    <span style={styles.top20ColName}>{row.nickname || "—"}</span>
                    <span style={styles.top20ColStat}>{row.avgDmg != null ? row.avgDmg.toLocaleString() : "—"}</span>
                    <span style={styles.top20ColStat}>{row.cv != null ? row.cv.toFixed(1) : "—"}</span>
                  </div>
                ))}
              </div>
            )}
          </div>

          <div style={styles.panel}>
            <div style={styles.panelTitle}>Snapshot history</div>
            {top20History.length <= 1 ? (
              <div style={styles.top20EditHint}>
                No earlier snapshots yet — the next time you update the Top 20, this one gets archived here so you can compare over time.
              </div>
            ) : (
              <div>
                {top20History.map((h) => (
                  <div key={h.updatedOn}>
                    <button
                      onClick={() => setExpandedHistoryDate(expandedHistoryDate === h.updatedOn ? null : h.updatedOn)}
                      style={styles.historyDateBtn}
                    >
                      <span>{fmtLong(h.updatedOn)}</span>
                      <span style={styles.historyDateSub}>
                        {h.rows[0] ? `#1 ${h.rows[0].nickname || "—"} · ${h.rows[0].avgDmg != null ? h.rows[0].avgDmg.toLocaleString() : "—"} dmg` : ""}
                        {" "}{expandedHistoryDate === h.updatedOn ? "▲" : "▼"}
                      </span>
                    </button>
                    {expandedHistoryDate === h.updatedOn && (
                      <div style={styles.top20Table}>
                        <div style={styles.top20HeaderRow}>
                          <span style={styles.top20ColRank}>#</span>
                          <span style={styles.top20ColName}>Nickname</span>
                          <span style={styles.top20ColStat}>Avg DMG</span>
                          <span style={styles.top20ColStat}>CV</span>

                        {h.rows.map((row) => (
                          <div key={row.rank} style={styles.top20Row(row.rank === 1)}>
                            <span style={styles.top20ColRank}>
                              {row.rank === 1 ? <Icon.crown size={12} style={{ marginRight: 3, marginBottom: -1 }} /> : null}
                              {row.rank}
                            </span>
                            <span style={styles.top20ColName}>{row.nickname || "—"}</span>
                            <span style={styles.top20ColStat}>{row.avgDmg != null ? row.avgDmg.toLocaleString() : "—"}</span>
                            <span style={styles.top20ColStat}>{row.cv != null ? row.cv.toFixed(1) : "—"}</span>
                          </div>
                        ))}
                      </div>
                    )}
                  </div>
                ))}
              </div>
            )}
          </div>
          </>
        )}

        <div style={styles.footer}>
          Source of truth:{" "}
          <a className="link" style={styles.link} href={BOARD_URL} target="_blank" rel="noopener noreferrer">akasha.cv</a>
          {" "}— log check-ins here whenever you look it up.
        </div>
      </div>
    </div>
  );
}

function RankChart({ points, maxRank }) {
  const W = 640, H = 200, padL = 30, padR = 16, padT = 12, padB = 24;
  const innerW = W - padL - padR;
  const innerH = H - padT - padB;
  const n = points.length;
  const x = (i) => padL + (n <= 1 ? innerW / 2 : (innerW * i) / (n - 1));
  const y = (rank) => padT + ((rank - 1) / (maxRank - 1 || 1)) * innerH;

  let path = "";
  points.forEach((p, i) => {
    const px = x(i);
    const py = y(p.rank);
    if (i === 0) {
      path += `M ${px} ${py}`;
    } else {
      const prevY = y(points[i - 1].rank);
      path += ` L ${px} ${prevY} L ${px} ${py}`;
    }
  });

  const rank1Y = y(1);
  const labelStep = Math.max(1, Math.ceil(n / 6));

  return (
    <svg width="100%" viewBox={`0 0 ${W} ${H}`} style={{ display: "block" }}>
      <line x1={padL} y1={rank1Y} x2={W - padR} y2={rank1Y} stroke="#f2c14e" strokeDasharray="4 4" strokeWidth="1" />
      {Array.from({ length: maxRank }, (_, i) => i + 1).map((r) => (
        <line key={r} x1={padL} y1={y(r)} x2={W - padR} y2={y(r)} stroke="#2a2246" strokeWidth="1" strokeDasharray="2 3" />
      ))}
      <path d={path} fill="none" stroke="#8b5cf6" strokeWidth="2.5" strokeLinejoin="round" />
      {points.map((p, i) => (
        <circle key={p.date} cx={x(i)} cy={y(p.rank)} r={i === n - 1 ? 4 : 3} fill="#8b5cf6" stroke="#0e0b1f" strokeWidth="1.5" />
      ))}
      {points.map((p, i) => (
        (i % labelStep === 0 || i === n - 1) && (
          <text key={p.date} x={x(i)} y={H - 6} fontSize="10" fill="#6b6289" textAnchor="middle" fontFamily="Inter">
            {fmtShort(p.date)}
          </text>
        )
      ))}
      {Array.from({ length: maxRank }, (_, i) => i + 1).map((r) => (
        <text key={r} x={padL - 6} y={y(r) + 3} fontSize="10" fill="#6b6289" textAnchor="end" fontFamily="Inter">{r}</text>
      ))}
    </svg>
  );
}

function BuildStat({ label, value, accent, wide }) {
  return (
    <div style={styles.buildStat(accent, wide)}>
      <div style={styles.statLabel}>{label}</div>
      <div style={wide ? styles.statValueText : styles.statValue(accent)}>{value}</div>
    </div>
  );
}

function StatCard({ label, value, sub, accent }) {
  return (
    <div style={styles.statCard(accent)}>
      <div style={styles.statLabel}>{label}</div>
      <div style={styles.statValue(accent)}>{value}</div>
      <div style={styles.statSub}>{sub}</div>
    </div>
  );
}
